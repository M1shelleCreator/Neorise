<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация · Neorise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width:450px; margin:40px auto;">
        <div class="card" style="border-color:#b44dff; box-shadow:0 0 30px rgba(180,77,255,0.2);">
            <h1 class="neon-text" style="text-align:center;">Neorise</h1>
            <h2 style="text-align:center; color:#c0c0c0;">Регистрация</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="regUsername" placeholder="Введите имя" required>
                </div>
                <div class="form-group">
                    <label>Номер телефона</label>
                    <input type="tel" id="regPhone" placeholder="+7 999 999-99-99" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label>Дата рождения</label>
                    <div style="display:flex; gap:8px;">
                        <select id="regDay" style="flex:1; padding:10px; border-radius:10px; background:#1a1a1a; color:#c0c0c0; border:1px solid #333;">
                            <option value="">День</option>
                        </select>
                        <select id="regMonth" style="flex:1; padding:10px; border-radius:10px; background:#1a1a1a; color:#c0c0c0; border:1px solid #333;">
                            <option value="">Месяц</option>
                        </select>
                        <select id="regYear" style="flex:1; padding:10px; border-radius:10px; background:#1a1a1a; color:#c0c0c0; border:1px solid #333;">
                            <option value="">Год</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="Минимум 6 символов" required>
                </div>
                <div class="form-group">
                    <label>Подтвердите пароль</label>
                    <input type="password" id="regConfirm" placeholder="Повторите пароль" required>
                </div>
                <button type="submit" class="btn-primary" style="width:100%;">Зарегистрироваться</button>
                <p id="regMessage" style="text-align:center; margin-top:10px;"></p>
                <p style="text-align:center; margin-top:10px;">Уже есть аккаунт? <a href="login.html" style="color:#b44dff;">Войти</a></p>
            </form>
        </div>
    </div>
    <script src="auth.js"></script>
    <script>
        // ===== ДНИ (1-31) =====
        const daySelect = document.getElementById('regDay');
        for (let i = 1; i <= 31; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = i;
            daySelect.appendChild(opt);
        }
        
        // ===== МЕСЯЦЫ =====
        const monthSelect = document.getElementById('regMonth');
        const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 
                        'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
        months.forEach((m, idx) => {
            const opt = document.createElement('option');
            opt.value = idx + 1;
            opt.textContent = m;
            monthSelect.appendChild(opt);
        });
        
        // ===== ГОДЫ (2026 → 1970) =====
        const yearSelect = document.getElementById('regYear');
        for (let y = 2026; y >= 1970; y--) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y;
            yearSelect.appendChild(opt);
        }
        
        // ===== РЕГИСТРАЦИЯ =====
        document.getElementById('registerForm').onsubmit = function(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const day = document.getElementById('regDay').value;
            const month = document.getElementById('regMonth').value;
            const year = document.getElementById('regYear').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const msg = document.getElementById('regMessage');
            
            if (username.length < 2) {
                msg.innerHTML = '❌ Имя минимум 2 символа';
                msg.style.color = '#ff4444';
                return;
            }
            if (!phone || phone.length < 10) {
                msg.innerHTML = '❌ Введите корректный телефон';
                msg.style.color = '#ff4444';
                return;
            }
            if (!email || !email.includes('@')) {
                msg.innerHTML = '❌ Введите корректный email';
                msg.style.color = '#ff4444';
                return;
            }
            if (!day || !month || !year) {
                msg.innerHTML = '❌ Укажите полную дату рождения';
                msg.style.color = '#ff4444';
                return;
            }
            if (password.length < 6) {
                msg.innerHTML = '❌ Пароль минимум 6 символов';
                msg.style.color = '#ff4444';
                return;
            }
            if (password !== confirm) {
                msg.innerHTML = '❌ Пароли не совпадают';
                msg.style.color = '#ff4444';
                return;
            }
            
            const monthNames = ['Января', 'Февраля', 'Марта', 'Апреля', 'Мая', 'Июня', 
                                'Июля', 'Августа', 'Сентября', 'Октября', 'Ноября', 'Декабря'];
            const birthday = day + ' ' + monthNames[month - 1] + ' ' + year;
            
            // Возраст вычисляем автоматически
            const age = new Date().getFullYear() - year;
            
            const result = registerUser(username, age, phone, email, birthday, password);
            if (result.success) {
                msg.innerHTML = '✅ Регистрация успешна! Теперь войдите.';
                msg.style.color = '#39ff14';
                setTimeout(() => window.location.href = 'login.html', 1500);
            } else {
                msg.innerHTML = '❌ ' + result.message;
                msg.style.color = '#ff4444';
            }
        };
    </script>
</body>
</html>
