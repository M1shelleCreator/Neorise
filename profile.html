<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль · Neorise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width:600px; margin:30px auto;">
        <div class="profile-card">
            <img id="profileAvatar" src="" alt="avatar" class="profile-avatar-large">
            <h1 id="profileUsername" class="profile-name"></h1>
            <div class="profile-info">
                <p>📱 <span id="profilePhone"></span></p>
                <p>📧 <span id="profileEmail"></span></p>
                <p>🎂 <span id="profileBirthday"></span></p>
                <p>🔐 2FA: <span id="twoFactorStatus" style="color:#888;">Выключена</span></p>
                <p>👤 Роль: <span id="profileRole">Клиент</span></p>
            </div>
            <div class="profile-actions">
                <button id="changeAvatarBtn" class="btn-secondary">📷 Сменить аватар</button>
                <input type="file" id="avatarInput" accept="image/*" style="display:none;">
                <button id="editProfileBtn" class="btn-primary">✏️ Редактировать</button>
                <button id="setupTwoFactorBtn" class="btn-secondary">🔐 Настроить 2FA</button>
                <button id="logoutBtn" class="btn-danger">🚪 Выйти</button>
            </div>
            <p id="profileMessage" style="text-align:center; margin-top:10px;"></p>
            <a href="index.html" class="neon-text" style="display:block; text-align:center; margin-top:15px;">← На главную</a>
        </div>
    </div>

    <!-- МОДАЛ РЕДАКТИРОВАНИЯ -->
    <div id="editModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 class="neon-text">Редактировать профиль</h3>
            <form id="editForm">
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="editUsername" required>
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="tel" id="editPhone">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="editEmail">
                </div>
                <div class="form-group">
                    <label>Дата рождения</label>
                    <input type="date" id="editBirthday">
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-primary">Сохранить</button>
                    <button type="button" class="btn-secondary" onclick="closeModal('editModal')">Отмена</button>
                </div>
            </form>
            <p id="editMessage" style="text-align:center; margin-top:10px;"></p>
        </div>
    </div>

    <!-- МОДАЛ 2FA -->
    <div id="twoFactorModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 class="neon-text">🔐 Двухфакторная аутентификация</h3>
            <div id="twoFactorInfo" style="color:#888;"></div>
            <div id="twoFactorSetup" style="display:none;">
                <p style="color:#888;">Секретный ключ: <b id="twoFactorSecretDisplay" style="color:#b44dff;"></b></p>
                <div class="form-group">
                    <label>Введите код из приложения:</label>
                    <input type="text" id="twoFactorTestCode" placeholder="6-значный код" maxlength="6">
                    <button id="verifyTwoFactorBtn" class="btn-primary" style="margin-top:10px;">Подтвердить</button>
                </div>
                <p id="twoFactorSetupMessage"></p>
            </div>
            <div id="twoFactorDisable" style="display:none;">
                <p style="color:#ff4444;">2FA включена. Отключить?</p>
                <button id="disableTwoFactorBtn" class="btn-danger">Отключить 2FA</button>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal('twoFactorModal')">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="profile.js"></script>
</body>
</html>
