<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neorise — Латерея</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- ===== ШАПКА ===== -->
        <header class="header">
            <div class="logo">✦ Neorise</div>
            <div class="header-actions">
                <button id="notifBtn" class="notif-btn">
                    📭
                    <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
                </button>
                <div class="profile-btn-header" id="profileBtnHeader">
                    <img id="headerAvatar" src="" alt="avatar">
                    <span id="headerName">Аккаунт</span>
                </div>
            </div>
        </header>

        <!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
        <div class="main-content">
            <div class="content-section">
                <h1 class="neon-text">★ Главная ★</h1>
                <p style="color:#888; margin-bottom:20px;">Добро пожаловать в Neorise. Здесь вы можете попытать удачу в лотерее.</p>
                
                <!-- КНОПКА ЛАТЕРЕИ -->
                <button id="lotteryBtn" class="lottery-btn">🎰 Латерея</button>
                
                <!-- ИНФО О БИЛЕТЕ -->
                <div id="ticketInfo" style="margin-top:20px; padding:15px; background:rgba(180,77,255,0.05); border-radius:12px; border:1px solid rgba(180,77,255,0.1); display:none;">
                    <p style="color:#b44dff; font-weight:bold;">🎟 Ваш билет:</p>
                    <p id="ticketStatus" style="color:#888;"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== МОДАЛ ЛОТЕРЕИ ===== -->
    <div id="lotteryModal" class="modal" style="display:none;">
        <div class="modal-content lottery-modal">
            <h2 class="neon-text" style="text-align:center; font-size:24px;">🎰 Латерея</h2>
            <p style="text-align:center; color:#888; font-size:14px; margin-bottom:5px;">🎟 Билет: <b style="color:#b44dff;">Латерея От Nyxon Studio</b></p>
            <p style="text-align:center; color:#888; font-size:13px;">Соберите 3 [LUCK] или 3 [PLAYER] для победы!</p>
            
            <div id="scratchCards" style="display:flex; gap:15px; justify-content:center; margin:25px 0;">
                <div class="scratch-card" data-index="0">
                    <div class="scratch-cover silver"></div>
                    <div class="scratch-result"></div>
                </div>
                <div class="scratch-card" data-index="1">
                    <div class="scratch-cover silver"></div>
                    <div class="scratch-result"></div>
                </div>
                <div class="scratch-card" data-index="2">
                    <div class="scratch-cover silver"></div>
                    <div class="scratch-result"></div>
                </div>
            </div>
            
            <p id="lotteryMessage" style="text-align:center; color:#888; font-size:14px; min-height:25px;"></p>
            
            <div class="modal-actions" style="justify-content:center;">
                <button id="closeLotteryBtn" class="btn-secondary" style="display:none;">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- ===== МОДАЛ ПРОФИЛЯ ===== -->
    <div id="profileModal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width:400px;">
            <div style="text-align:center;">
                <img id="modalAvatar" src="" alt="avatar" style="width:100px;height:100px;border-radius:50%;border:2px solid #b44dff;">
                <h3 id="modalUsername" class="neon-text"></h3>
                <p id="modalRole" style="color:#888;"></p>
                <p id="modalPhone" style="color:#888;"></p>
                <p id="modalEmail" style="color:#888;"></p>
                <p id="modal2FA" style="color:#888;"></p>
                <p id="modalLotteryStats" style="color:#ffd700; font-weight:bold; margin-top:5px;"></p>
                <div id="modalActions" style="margin-top:15px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center;"></div>
                <button class="btn-secondary" onclick="closeModal('profileModal')">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- ===== МОДАЛ УВЕДОМЛЕНИЙ ===== -->
    <div id="notifModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 class="neon-text">📬 Уведомления</h3>
            <div id="notifList" style="margin:10px 0;"></div>
            <button class="btn-secondary" onclick="closeModal('notifModal')">Закрыть</button>
        </div>
    </div>

    <!-- ===== МОДАЛ ЧАТА ===== -->
    <div id="chatModal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width:600px; max-height:80vh;">
            <h3 id="chatModalTitle" class="neon-text">Чат</h3>
            <div id="chatModalMessages" style="max-height:300px; overflow-y:auto; margin:10px 0; display:flex; flex-direction:column; gap:5px;"></div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <div style="display:flex; gap:8px; flex:1;">
                    <input type="text" id="chatModalInput" placeholder="Сообщение..." style="flex:1;">
                    <button id="chatModalSend" class="btn-primary">Отправить</button>
                </div>
                <div id="chatModalMediaActions" style="display:flex; gap:5px;"></div>
            </div>
            <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;" id="chatModalAdminActions"></div>
            <button class="btn-secondary" onclick="closeModal('chatModal')">Закрыть</button>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="main.js"></script>
</body>
</html>
